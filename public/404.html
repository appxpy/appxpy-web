<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Pankevich George</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#0c0c0c">
    <link rel="icon" href="/favicon.ico">
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; background: #0c0c0c; color: #fff; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
        body { display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; position: relative; overflow: hidden; }
        body::before, body::after {
            content: ""; position: absolute; width: 60vmax; height: 60vmax; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
            pointer-events: none;
        }
        body::before { top: -20%; left: -10%; }
        body::after  { bottom: -25%; right: -15%; background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 60%); }
        main { position: relative; max-width: 32rem; z-index: 1; }
        .code { font-size: clamp(4rem, 14vw, 9rem); font-weight: 200; letter-spacing: 0.04em; line-height: 1; margin: 0 0 1rem; }
        .msg { text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.9rem; opacity: 0.7; margin: 0 0 2rem; }
        a { display: inline-block; text-transform: uppercase; letter-spacing: 0.18em; font-size: 0.9rem; color: #fff;
            text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.35); padding: 0.4rem 0; transition: border-color 160ms ease; }
        a:hover, a:focus-visible { border-color: #fff; outline: none; }
    </style>
</head>
<body>
    <main>
        <p class="code">404</p>
        <p class="msg">Page not found</p>
        <a href="/">↗ Back home</a>
    </main>
</body>
</html>
